<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提示词生成器 - Prompt Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #0f0f14; --surface: #1a1a24; --surface2: #24242f; --border: #333344; --text: #e0e0ec; --text2: #8888a0; --accent: #7c5cfc; --accent-hover: #9b7cff; --green: #34d399; --orange: #f59e0b; --red: #ef4444; --radius: 10px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; background: linear-gradient(135deg, #7c5cfc, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: var(--text2); font-size: 13px; margin-bottom: 20px; }
  .top-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 14px; }
  .prompt-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
  .prompt-row .plabel { font-size: 12px; font-weight: 600; color: var(--text2); min-width: 56px; padding-top: 12px; flex-shrink: 0; }
  .prompt-row textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 13px; line-height: 1.5; resize: vertical; min-height: 60px; font-family: inherit; outline: none; transition: border-color .2s; }
  .prompt-row textarea:focus { border-color: var(--accent); }
  .btn-group { display: flex; flex-direction: column; gap: 5px; min-width: 88px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 4px; padding: 7px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; font-family: inherit; }
  .btn:active { transform: scale(.97); }
  .btn-random { background: var(--accent); color: #fff; }
  .btn-random:hover { background: var(--accent-hover); }
  .btn-copy { background: var(--green); color: #0f0f14; }
  .btn-copy:hover { opacity: .85; }
  .btn-optimize { background: var(--orange); color: #0f0f14; }
  .btn-optimize:hover { opacity: .85; }
  .btn-clear { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); font-size: 11px; padding: 4px 10px; }
  .btn-clear:hover { color: var(--text); }
  .en-row { margin-bottom: 0; }
  .en-row textarea { min-height: 50px; font-size: 12px; color: #b0b0c0; }
  .bottom-bar { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
  .bottom-bar .hint { color: var(--text2); font-size: 11px; }
  .toast { font-size: 11px; padding: 3px 10px; border-radius: 5px; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.success { background: rgba(52, 211, 153, .15); color: var(--green); }
  .toast.error { background: rgba(239, 68, 68, .15); color: var(--red); }
  .identity-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 14px; display: flex; flex-wrap: wrap; align-items: center; gap: 14px 22px; }
  .identity-bar .ilabel { font-size: 12px; font-weight: 600; color: var(--text2); margin-right: 3px; }
  .age-group { display: flex; align-items: center; gap: 8px; }
  .age-group input[type="range"] { -webkit-appearance: none; width: 110px; height: 4px; background: #3a3a4a; border-radius: 2px; outline: none; }
  .age-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; cursor: pointer; }
  .age-display { font-size: 14px; font-weight: 700; color: var(--accent); min-width: 28px; text-align: center; }
  .selector-group { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .selector-group select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 4px 8px; font-size: 12px; font-family: inherit; outline: none; cursor: pointer; }
  .selector-group select:focus { border-color: var(--accent); }
  .ipreview { font-size: 11px; color: var(--text2); background: var(--surface2); padding: 3px 8px; border-radius: 5px; }
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
  .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; transition: border-color .2s; }
  .cat-card.enabled { border-color: rgba(124, 92, 252, .3); }
  .cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .cat-name { font-size: 13px; font-weight: 600; }
  .cat-count { font-size: 10px; color: var(--text2); margin-left: 6px; }
  .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; cursor: pointer; inset: 0; background: #3a3a4a; border-radius: 20px; transition: .3s; }
  .toggle .slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(16px); }
  .cat-preview { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .chip { font-size: 10px; background: var(--surface2); color: var(--text2); padding: 2px 6px; border-radius: 3px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; transition: all .12s; }
  .chip:hover { background: var(--accent); color: #fff; }
  .footer-info { margin-top: 14px; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 11px; }
  .mgmt-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; margin-bottom: 14px; }
  .mgmt-bar .btn-mgmt { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); font-size: 12px; padding: 5px 12px; }
  .mgmt-bar .btn-mgmt:hover { border-color: var(--accent); color: var(--text); }
  .mgmt-panel { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .mgmt-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .mgmt-row:last-child { margin-bottom: 0; }
  .mgmt-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 12px; font-family: inherit; outline: none; }
  .mgmt-input:focus { border-color: var(--accent); }
  .mgmt-textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 12px; font-family: inherit; outline: none; resize: vertical; }
  .mgmt-textarea:focus { border-color: var(--accent); }
  .btn-sm { font-size: 11px; padding: 5px 10px; border-radius: 5px; }
  .btn-add { background: var(--accent); color: #fff; }
  .btn-add:hover { background: var(--accent-hover); }
  .btn-del { background: transparent; color: var(--red); border: 1px solid var(--red); font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
  .btn-del:hover { background: rgba(239,68,68,.15); }
  .cat-mgmt-actions { margin-top: 6px; display: flex; gap: 4px; }
  .cat-mgmt-actions button { font-size: 10px; padding: 3px 8px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }
  .cat-mgmt-actions button:hover { border-color: var(--accent); color: var(--text); }
  .pm-overlay { position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; padding:20px; }
  .pm-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; max-width:650px; width:100%; max-height:80vh; display:flex; flex-direction:column; }
  .pm-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
  .pm-header h3 { font-size:15px; font-weight:600; }
  .pm-body { flex:1; overflow-y:auto; padding:14px 18px; }
  .pm-search { width:100%; padding:6px 10px; margin-bottom:10px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; outline:none; }
  .pm-search:focus { border-color:var(--accent); }
  .pm-list { display:flex; flex-direction:column; gap:4px; margin-bottom:14px; }
  .pm-item { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border-radius:6px; padding:6px 10px; }
  .pm-item .pm-cn { font-size:12px; color:var(--text); }
  .pm-item .pm-en { font-size:10px; color:var(--text2); margin-left:8px; }
  .pm-item .btn-del { padding:1px 6px; font-size:10px; }
  .pm-add-row { display:flex; gap:6px; margin-bottom:6px; align-items:center; }
  .pm-add-row input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:6px 10px; font-size:12px; font-family:inherit; outline:none; }
  .pm-add-row input:focus { border-color:var(--accent); }
  .pm-add-row .btn-sm { flex-shrink:0; }
  .pm-batch { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:6px 10px; font-size:12px; font-family:inherit; outline:none; resize:vertical; min-height:50px; }
  .pm-batch:focus { border-color:var(--accent); }
  .pm-footer { padding:10px 18px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
  .pm-footer button { font-size:11px; padding:5px 14px; border-radius:5px; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--text2); }
  .pm-footer button:hover { border-color:var(--accent); color:var(--text); }
  .pm-empty { color:var(--text2); font-size:12px; text-align:center; padding:20px; }
  .mgmt-badge { font-size:10px; background:var(--accent); color:#fff; border-radius:3px; padding:1px 5px; margin-left:6px; }
  .ai-bar { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:8px 16px; margin-bottom:14px; display:flex; flex-wrap:wrap; align-items:center; gap:8px 16px; }
  .ai-bar .ai-toggle-group { display:flex; align-items:center; gap:8px; }
  .ai-bar .ai-toggle-group .ai-icon { font-size:18px; }
  .ai-bar .ai-toggle-group .ai-label { font-size:13px; font-weight:600; color:var(--text); }
  .ai-bar .btn-ai-sm { font-size:11px; padding:4px 10px; border-radius:5px; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--text2); font-family:inherit; }
  .ai-bar .btn-ai-sm:hover { border-color:var(--accent); color:var(--text); }
  .ai-indicator { font-size:10px; color:var(--text2); display:inline-flex; align-items:center; gap:4px; }
  .ai-indicator.on { color:#34d399; }
  .btn-ai { background:#6366f1; color:#fff; }
  .btn-ai:hover { opacity:.85; }
  .ai-model-select { width:100%; padding:7px 10px; background:var(--surface2); border:1px solid var(--accent); border-radius:6px; color:var(--text); font-size:13px; margin-bottom:6px; outline:none; font-family:inherit; }
  .ai-settings-input { width:100%; padding:7px 10px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; margin-bottom:10px; outline:none; font-family:inherit; }
  .ai-settings-input:focus { border-color:var(--accent); }
  .ai-settings-select { width:100%; padding:7px 10px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; margin-bottom:10px; outline:none; font-family:inherit; }
  .ai-settings-select:focus { border-color:var(--accent); }
  .ai-label { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:4px; }
  .ai-btn-full { width:100%; padding:8px; border-radius:6px; cursor:pointer; font-size:13px; font-family:inherit; border:none; }
  .ai-btn-full:disabled { opacity:.5; cursor:not-allowed; }
  .ai-history-card { background:var(--surface2); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
  .ai-history-time { font-size:10px; color:var(--text2); margin-bottom:4px; }
  .ai-history-label { font-size:10px; font-weight:600; }
  .ai-history-label.orig { color:var(--text2); }
  .ai-history-label.pol { color:#34d399; }
  .ai-history-text { font-size:11px; color:var(--text); margin-bottom:4px; word-break:break-all; }
  .ai-history-text.en { font-size:10px; color:#b0b0c0; }
  #promptArea { min-height:100px; }
  #promptEnArea { min-height:50px; }
  .comfy-bar { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:8px 16px; margin-bottom:14px; display:flex; flex-wrap:wrap; align-items:center; gap:8px 16px; }
  .comfy-bar .comfy-label { font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .comfy-bar .btn-comfy-sm { font-size:11px; padding:4px 10px; border-radius:5px; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--text2); font-family:inherit; }
  .comfy-bar .btn-comfy-sm:hover { border-color:var(--accent); color:var(--text); }
  .comfy-bar .btn-comfy-go { background:#6366f1; color:#fff; font-size:12px; padding:5px 14px; border:none; border-radius:6px; cursor:pointer; font-family:inherit; }
  .comfy-bar .btn-comfy-go:hover { opacity:.85; }
  .comfy-bar .btn-comfy-go:disabled { opacity:.5; cursor:not-allowed; }
  .comfy-progress { font-size: 10px; color: var(--text2); }
  .comfy-progress-wrap { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .comfy-progress-track { width: 100%; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .comfy-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #34d399); border-radius: 3px; transition: width .4s ease; }
  .comfy-progress-info { font-size: 10px; color: var(--text2); margin-top: 4px; display: flex; justify-content: space-between; gap: 8px; }
  .comfy-progress-info .pp-status { color: var(--text); font-weight: 600; }
  /* Gallery */
  .gallery-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-top: 14px; }
  .gallery-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .gallery-title { font-size: 15px; font-weight: 600; }
  .gallery-count { font-size: 11px; color: var(--text2); }
  .gallery-clear-btn { font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-family: inherit; margin-left: auto; }
  .gallery-clear-btn:hover { border-color: var(--red); color: var(--red); }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .gallery-item { position: relative; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); aspect-ratio: 1; background: var(--surface2); }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .2s; }
  .gallery-item:hover img { transform: scale(1.05); }
  .gallery-item .gallery-badge { position: absolute; bottom: 4px; right: 4px; font-size: 10px; background: rgba(0,0,0,.7); color: #fff; padding: 1px 6px; border-radius: 3px; pointer-events: none; }
  .gallery-item-actions { position: absolute; top: 4px; right: 4px; display: flex; gap: 3px; opacity: 0; transition: opacity .2s; }
  .gallery-item:hover .gallery-item-actions { opacity: 1; }
  .gallery-item-actions button { width: 22px; height: 22px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.6); color: #fff; transition: background .15s; }
  .gallery-item-actions button:hover { background: var(--accent); }
  .gallery-item-actions .btn-g-del:hover { background: var(--red); }
  .img-modal-info { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.75); color: #e0e0ec; padding: 12px 18px; font-size: 12px; cursor: default; max-height: 30%; overflow-y: auto; }
  .img-modal-info .imi-label { font-size: 10px; color: #8888a0; margin-right: 6px; }
  .img-modal-info .imi-prompt { word-break: break-all; margin-bottom: 4px; line-height: 1.4; }
  .img-modal-info .imi-seed { color: var(--accent); font-weight: 600; }
  .img-modal-info .imi-actions { display: flex; gap: 6px; margin-top: 6px; }
  .img-modal-info .imi-actions button { font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer; border: 1px solid var(--border); background: rgba(255,255,255,.1); color: #fff; font-family: inherit; }
  .img-modal-info .imi-actions button:hover { background: var(--accent); }
  .img-modal-info .imi-actions .imi-del:hover { background: var(--red); border-color: var(--red); }
  .gallery-empty { text-align: center; color: var(--text2); font-size: 12px; padding: 30px 0; display: block; }
  /* Image Modal */
  .img-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.85); z-index: 2000; display: none; align-items: center; justify-content: center; cursor: pointer; }
  .img-modal.open { display: flex; }
  .img-modal-content { max-width: 92vw; max-height: 90vh; object-fit: contain; border-radius: 8px; cursor: default; box-shadow: 0 4px 30px rgba(0,0,0,.5); }
  .img-modal-close { position: fixed; top: 18px; right: 26px; color: #fff; font-size: 36px; font-weight: bold; cursor: pointer; z-index: 2001; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(0,0,0,.4); transition: background .2s; }
  .img-modal-close:hover { background: var(--accent); }
  @media (max-width: 640px) { .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); } }
  .comfy-wf-item { display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border-radius:6px; padding:6px 10px; margin-bottom:4px; }
  .comfy-wf-item .wf-name { font-size:12px; color:var(--text); }
  .comfy-wf-item .wf-active { font-size:10px; color:#34d399; margin-left:6px; }
  .comfy-wf-item .wf-actions { display:flex; gap:4px; }
  .comfy-wf-item button { font-size:10px; padding:2px 8px; border-radius:4px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text2); }
  .comfy-wf-item button:hover { border-color:var(--accent); color:var(--text); }
  .comfy-wf-item .wf-del { color:var(--red); border-color:var(--red); }
  .comfy-wf-item .wf-del:hover { background:rgba(239,68,68,.15); }
  .comfy-dim-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
  .comfy-dim-row input { width:80px; padding:6px 8px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; text-align:center; outline:none; font-family:inherit; }
  .comfy-dim-row input:focus { border-color:var(--accent); }
  .comfy-dim-row span { color:var(--text2); font-size:12px; }
  .comfy-node-info { font-size:11px; color:var(--text2); background:var(--surface2); border-radius:6px; padding:6px 10px; margin-bottom:8px; }
  @media (max-width: 640px) { body { padding: 10px; } .prompt-row { flex-direction: column; } .prompt-row .plabel { min-width: unset; padding-top: 0; } .btn-group { flex-direction: row; min-width: unset; } .cat-grid { grid-template-columns: 1fr; } .identity-bar { flex-direction: column; align-items: stretch; gap: 8px; } }
</style>
</head>
<body>
<div class="container">
  <h1>🎨 提示词生成器</h1>
  <p class="subtitle">从已开启的类别中随机组合提示词，支持中英文对照与深度优化</p>

  <div class="top-section">
    <!-- CN Prompt -->
    <div class="prompt-row">
      <span class="plabel">🇨🇳 中文</span>
      <textarea id="promptArea" placeholder="点击「随机」生成提示词，或手动输入..." oninput="autoResizeTextarea(this)" data-min-height="180"></textarea>
      <div class="btn-group">
        <button class="btn btn-random" onclick="randomPrompt()">🎲 随机</button>
        <button class="btn btn-optimize" onclick="optimizePrompt()">✨ 优化</button>
        <button class="btn btn-ai" onclick="aiPolish()" id="aiPolishBtn" title="使用 AI 润色提示词">🤖 AI</button>
        <button class="btn btn-copy" onclick="copyPrompt('promptArea')">📋 复制</button>
        <button class="btn btn-clear" onclick="clearPrompt()">清空</button>
      </div>
    </div>
    <!-- EN Prompt -->
    <div class="prompt-row en-row">
      <span class="plabel">🇬🇧 English</span>
      <textarea id="promptEnArea" readonly placeholder="英文提示词将自动同步显示..." oninput="autoResizeTextarea(this)" data-min-height="50"></textarea>
      <div class="btn-group">
        <button class="btn btn-copy" onclick="copyPrompt('promptEnArea')" style="font-size:11px;padding:5px 8px;">📋 复制</button>
      </div>
    </div>
    <div class="bottom-bar">
      <span class="hint">💡 点击下方词条 · 中英文自动同步</span>
      <span id="toast" class="toast"></span>
    </div>
  </div>

  <!-- AI Control Bar -->
  <div class="ai-bar">
    <div class="ai-toggle-group">
      <span class="ai-icon">🤖</span>
      <span class="ai-label">AI 润色</span>

<div class="img-modal" id="imgModal" onclick="closeImgModal()">

        <button onclick="downloadCurrentModalImg()">⬇️ 下载</button>
        <button class="imi-del" onclick="deleteCurrentModalImg()">🗑️ 删除</button>
      </div>

<script>
// Data constants now loaded from server JSON files via /api/load-* endpoints

// Global vars for hardcoded data (populated from server on load)
let CN_EN_MAP = {};
let IDENTITY_EN = {'中国':'Chinese','韩国':'Korean','日本':'Japanese','欧美':'Western','女':'Female','男':'Male'};
let enrichCN = [];
let enrichEN = [];
let skinCN = [];
let skinEN = [];
let qualityCN = [];
let qualityEN = [];


let promptsEnabled = {};
let DATA = null;
const STORAGE_KEY = 'pg_prompts_data';

async function init() {
  // First try to load from server backup file
  if(window.location.origin&&window.location.origin.startsWith('http')){
    const loaded=await loadAllFromServer();
    if(loaded){console.log('✅ Data restored from server backup');}
  }
  // Load hardcoded data constants from server JSON files
  await loadDataConstants();
  // Load from localStorage
  const saved = localStorage.getItem(STORAGE_KEY);
  const savedEnabled = localStorage.getItem(STORAGE_KEY + '_enabled');
  if (saved) {
    DATA = JSON.parse(saved);
  } else {
    DATA = [];
  }
  if (savedEnabled) {
    promptsEnabled = JSON.parse(savedEnabled);
  } else {
    DATA.forEach(cat => { promptsEnabled[cat.name] = true; });
  }
  loadAiSettings();
  loadAiPreset();
  loadAiHistory();
  loadComfySettings();
  loadComfyWorkflows();
  loadComfyGallery();
  loadIdentitySettings();
  updateAiStatus();
  updateComfyStatus();
  renderCategories();
  renderIdentityBar();
  renderComfyGallery();
  resizePromptAreas();
  // Auto-detect ComfyUI connection
  setTimeout(()=>checkComfyConnection(),500);
}

function renderCategories() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  let total = 0;
  const isMgmt = document.getElementById('mgmtPanel').style.display !== 'none';
  DATA.forEach((cat, idx) => {
    total += cat.items.length;
    const card = document.createElement('div');
    card.className = 'cat-card' + (promptsEnabled[cat.name] !== false ? ' enabled' : '');
    card.dataset.idx = idx;
    const header = document.createElement('div');
    header.className = 'cat-header';
    const checked = promptsEnabled[cat.name] !== false ? 'checked' : '';
    let headerHtml = `<div><span class="cat-name">${escapeHtml(cat.name)}</span><span class="cat-count">${cat.items.length}</span></div>`;
    if (isMgmt) {
      headerHtml += `<button class="btn-del" onclick="deleteCategory(${idx})" title="删除此类别">✕</button>`;
    } else {
      headerHtml += `<label class="toggle"><input type="checkbox" ${checked} onchange="toggleCat('${cat.name.replace(/'/g, "\\'")}', this.checked, ${idx})"><span class="slider"></span></label>`;
    }
    header.innerHTML = headerHtml;
    card.appendChild(header);
    const preview = document.createElement('div');
    preview.className = 'cat-preview';
    cat.items.slice(0, 8).forEach(item => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = item.cn;
      chip.title = item.en;
      chip.onclick = () => addToPrompt(item.cn);
      preview.appendChild(chip);
    });
    if (cat.items.length > 8) {
      const more = document.createElement('span');
      more.className = 'chip';
      more.textContent = `+${cat.items.length - 8}`;
      more.style.opacity = '.5';
      more.onclick = () => showAllItems(idx);
      preview.appendChild(more);
    }
    card.appendChild(preview);
    // Management actions for this category
    if (isMgmt) {
      const actions = document.createElement('div');
      actions.className = 'cat-mgmt-actions';
      const mgmtBtn = document.createElement('button');
      mgmtBtn.textContent = '📝 管理提示词';
      mgmtBtn.onclick = () => openPromptManager(idx);
      actions.appendChild(mgmtBtn);
      card.appendChild(actions);
    }
    grid.appendChild(card);
  });
  document.getElementById('totalItems').textContent = total;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(el.scrollHeight, parseInt(el.dataset.minHeight||'60')) + 'px';
}

function resizePromptAreas() {
  autoResizeTextarea(document.getElementById('promptArea'));
  autoResizeTextarea(document.getElementById('promptEnArea'));
}

function toggleMgmtPanel() {
  const panel = document.getElementById('mgmtPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  renderCategories();
  if (panel.style.display === 'block') {
    renderIdentityManagement();
    renderEnrichManagement();
  }
}

function toggleCat(name, enabled, idx) {
  document.querySelectorAll('.cat-card')[idx].classList.toggle('enabled', enabled);
  promptsEnabled[name] = enabled;
  saveData();
}

function _getIdentity(prefixEn) {
  const ageRandom = document.getElementById('ageRandomToggle') && document.getElementById('ageRandomToggle').checked;
  const regionRandom = document.getElementById('regionRandomToggle') && document.getElementById('regionRandomToggle').checked;
  const genderRandom = document.getElementById('genderRandomToggle') && document.getElementById('genderRandomToggle').checked;
  let age, region, gender;
  if (ageRandom) {
    const min = parseInt(document.getElementById('ageSlider').min) || 18;
    const max = parseInt(document.getElementById('ageSlider').max) || 49;
    age = Math.floor(Math.random() * (max - min + 1)) + min;
  } else {
    age = document.getElementById('ageSlider').value;
  }
  if (regionRandom) {
    const regions = identityRegions.length ? identityRegions : ['中国', '韩国', '日本', '欧美'];
    region = regions[Math.floor(Math.random() * regions.length)];
  } else {
    region = document.getElementById('regionSelect').value;
  }
  if (genderRandom) {
    gender = identityGenders[Math.floor(Math.random() * identityGenders.length)] || '';
  } else {
    gender = document.getElementById('genderSelect').value || '';
  }
  if (prefixEn) {
    const rf = IDENTITY_EN[region] || region;
    const gf = gender ? (IDENTITY_EN[gender] || gender) : '';
    return `${rf}, ${age} years old${gf ? ', ' + gf : ''}`;
  }
  return `${region}，${age}岁${gender ? '，' + gender : ''}`;
}
function getIdentityPrefix() { return _getIdentity(false); }
function getIdentityEn() { return _getIdentity(true); }

function updateAgeDisplay() {
  document.getElementById('ageDisplay').textContent = document.getElementById('ageSlider').value;
  updateIdentityPreview();
}

function updateIdentityPreview() {
  const preview = document.getElementById('identityPreview');
  if (preview) preview.textContent = getIdentityPrefix();
}

// ===== Identity Management =====
const IDENTITY_REGIONS_KEY = 'pg_identity_regions';
const IDENTITY_GENDERS_KEY = 'pg_identity_genders';
const IDENTITY_AGE_KEY = 'pg_identity_age';
const IDENTITY_AGE_RANDOM_KEY = 'pg_identity_age_random';
const IDENTITY_REGION_RANDOM_KEY = 'pg_identity_region_random';
const IDENTITY_GENDER_RANDOM_KEY = 'pg_identity_gender_random';

let identityRegions = [];
let identityGenders = [];
let identityAge = {};
let identityAgeRandom = false;
let identityRegionRandom = false;
let identityGenderRandom = false;

function defaultIdentityRegions() { return ['中国', '韩国', '日本', '欧美']; }
function defaultIdentityGenders() { return ['女', '男']; }
function defaultIdentityAge() { return { min: 18, max: 49 }; }

function loadIdentitySettings() {
  try {
    const r = localStorage.getItem(IDENTITY_REGIONS_KEY);
    identityRegions = r ? JSON.parse(r) : defaultIdentityRegions();
  } catch(e) { identityRegions = defaultIdentityRegions(); }
  try {
    const r = localStorage.getItem(IDENTITY_GENDERS_KEY);
    identityGenders = r ? JSON.parse(r) : defaultIdentityGenders();
  } catch(e) { identityGenders = defaultIdentityGenders(); }
  try {
    const r = localStorage.getItem(IDENTITY_AGE_KEY);
    identityAge = r ? JSON.parse(r) : defaultIdentityAge();
  } catch(e) { identityAge = defaultIdentityAge(); }
  try {
    identityAgeRandom = localStorage.getItem(IDENTITY_AGE_RANDOM_KEY) === 'true';
  } catch(e) { identityAgeRandom = false; }
  try {
    identityRegionRandom = localStorage.getItem(IDENTITY_REGION_RANDOM_KEY) === 'true';
  } catch(e) { identityRegionRandom = false; }
  try {
    identityGenderRandom = localStorage.getItem(IDENTITY_GENDER_RANDOM_KEY) === 'true';
  } catch(e) { identityGenderRandom = false; }
}

function saveIdentitySettings() {
  localStorage.setItem(IDENTITY_REGIONS_KEY, JSON.stringify(identityRegions));
  localStorage.setItem(IDENTITY_GENDERS_KEY, JSON.stringify(identityGenders));
  localStorage.setItem(IDENTITY_AGE_KEY, JSON.stringify(identityAge));
  localStorage.setItem(IDENTITY_AGE_RANDOM_KEY, String(identityAgeRandom));
  localStorage.setItem(IDENTITY_REGION_RANDOM_KEY, String(identityRegionRandom));
  localStorage.setItem(IDENTITY_GENDER_RANDOM_KEY, String(identityGenderRandom));
  syncAllToServer();
}

function renderIdentityBar() {
  const regionSel = document.getElementById('regionSelect');
  const genderSel = document.getElementById('genderSelect');
  const ageSlider = document.getElementById('ageSlider');
  const ageDisplay = document.getElementById('ageDisplay');
  const ageRandomToggle = document.getElementById('ageRandomToggle');
  const regionRandomToggle = document.getElementById('regionRandomToggle');
  const genderRandomToggle = document.getElementById('genderRandomToggle');
  if (regionSel) {
    const current = regionSel.value || identityRegions[0] || '';
    regionSel.innerHTML = identityRegions.map(r => `<option value="${r}">${r}</option>`).join('');
    if (identityRegions.includes(current)) regionSel.value = current;
  }
  if (genderSel) {
    const current = genderSel.value || identityGenders[0] || '';
    genderSel.innerHTML = identityGenders.map(g => `<option value="${g}">${g}</option>`).join('');
    if (identityGenders.includes(current)) genderSel.value = current;
  }
  if (ageSlider) {
    ageSlider.min = identityAge.min || 18;
    ageSlider.max = identityAge.max || 49;
    const val = parseInt(ageSlider.value);
    if (val < ageSlider.min) ageSlider.value = ageSlider.min;
    if (val > ageSlider.max) ageSlider.value = ageSlider.max;
  }
  if (ageDisplay) ageDisplay.textContent = document.getElementById('ageSlider').value;
  if (ageRandomToggle) ageRandomToggle.checked = identityAgeRandom;
  if (regionRandomToggle) regionRandomToggle.checked = identityRegionRandom;
  if (genderRandomToggle) genderRandomToggle.checked = identityGenderRandom;
  updateIdentityPreview();
}

function renderIdentityManagement() {
  const regionList = document.getElementById('regionList');
  const genderList = document.getElementById('genderList');
  const ageMinInput = document.getElementById('ageMinInput');
  const ageMaxInput = document.getElementById('ageMaxInput');
  if (regionList) {
    regionList.innerHTML = identityRegions.map((r, i) =>
      `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:11px;">${r}<button onclick="deleteRegion(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:0;line-height:1;">✕</button></span>`
    ).join('');
  }
  if (genderList) {
    genderList.innerHTML = identityGenders.map((g, i) =>
      `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:11px;">${g}<button onclick="deleteGender(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:0;line-height:1;">✕</button></span>`
    ).join('');
  }
  if (ageMinInput) ageMinInput.value = identityAge.min || 18;
  if (ageMaxInput) ageMaxInput.value = identityAge.max || 49;
}

function addRegion() {
  const input = document.getElementById('newRegionInput');
  const name = input.value.trim();
  if (!name) { showToast('⚠️ 请输入地区名称', 'error'); return; }
  if (identityRegions.includes(name)) { showToast('⚠️ 地区已存在', 'error'); return; }
  identityRegions.push(name);
  input.value = '';
  saveIdentitySettings();
  renderIdentityBar();
  renderIdentityManagement();
  showToast(`✅ 已添加地区「${name}」`, 'success');
}

function deleteRegion(idx) {
  if (idx < 0 || idx >= identityRegions.length) return;
  const name = identityRegions[idx];
  if (!confirm(`确定删除地区「${name}」？`)) return;
  identityRegions.splice(idx, 1);
  saveIdentitySettings();
  renderIdentityBar();
  renderIdentityManagement();
  showToast(`🗑️ 已删除地区「${name}」`, 'success');
}

function addGender() {
  const input = document.getElementById('newGenderInput');
  const name = input.value.trim();
  if (!name) { showToast('⚠️ 请输入性别', 'error'); return; }
  if (identityGenders.includes(name)) { showToast('⚠️ 性别已存在', 'error'); return; }
  identityGenders.push(name);
  input.value = '';
  saveIdentitySettings();
  renderIdentityBar();
  renderIdentityManagement();
  showToast(`✅ 已添加性别「${name}」`, 'success');
}

function deleteGender(idx) {
  if (idx < 0 || idx >= identityGenders.length) return;
  const name = identityGenders[idx];
  if (!confirm(`确定删除性别「${name}」？`)) return;
  identityGenders.splice(idx, 1);
  saveIdentitySettings();
  renderIdentityBar();
  renderIdentityManagement();
  showToast(`🗑️ 已删除性别「${name}」`, 'success');
}

function saveAgeRange() {
  const min = parseInt(document.getElementById('ageMinInput').value) || 18;
  const max = parseInt(document.getElementById('ageMaxInput').value) || 49;
  if (min >= max) { showToast('⚠️ 最小年龄必须小于最大年龄', 'error'); return; }
  if (min < 1) { showToast('⚠️ 最小年龄不能小于1', 'error'); return; }
  if (max > 99) { showToast('⚠️ 最大年龄不能超过99', 'error'); return; }
  identityAge.min = min;
  identityAge.max = max;
  saveIdentitySettings();
  renderIdentityBar();
  showToast(`✅ 年龄范围已更新: ${min}~${max}`, 'success');
}

// ===== Enrich Template Management =====
const ENRICH_TYPES = [
  { key: 'enrichCN', label: '🌄 场景描述 (CN)', color: '#7c5cfc' },
  { key: 'enrichEN', label: '🌄 Scene Description (EN)', color: '#a78bfa' },
  { key: 'skinCN', label: '👩 皮肤描述 (CN)', color: '#f59e0b' },

function deleteEnrichItem(key, idx) {

function randomPrompt() {
  const enabledCats = DATA.filter(c => promptsEnabled[c.name]);
  if (enabledCats.length === 0) { showToast('⚠️ 请至少开启一个类别', 'error'); return; }
  const picks = [];
  enabledCats.forEach(cat => { if (cat.items.length) picks.push(cat.items[Math.floor(Math.random() * cat.items.length)]); });
  const identity = getIdentityPrefix();
  const cn = identity + '，' + picks.map(p => p.cn).join('，');
  setPrompt(cn, picks);
  showToast(`✅ 已生成，共 ${enabledCats.length} 个类别`, 'success');
}

function setPrompt(cnText, usedItems) {
  document.getElementById('promptArea').value = cnText;
  syncEn(cnText, usedItems);
  resizePromptAreas();
}

function syncEn(cnText, usedItems) {
  let en = '';
  if (usedItems && usedItems.length) {
    const idEn = getIdentityEn();
    en = idEn + ', ' + usedItems.map(p => p.en.split('/')[0].trim()).join(', ');
  } else {
    const segs = cnText.split(/[，,]/).map(s => s.trim()).filter(Boolean);
    en = segs.map(s => {
      const e = CN_EN_MAP[s];
      if(e)return e.split('/')[0].trim();
      if(DATA)for(const cat of DATA)for(const item of cat.items)if(item.cn===s)return item.en.split('/')[0].trim();
      return s;
    }).join(', ');
  }
  document.getElementById('promptEnArea').value = en;
}
function optimizePrompt() {
  const cnText = document.getElementById('promptArea').value.trim();
  if (!cnText) { showToast('⚠️ 提示词为空，请先生成', 'error'); return; }
  const segments = cnText.split(/[，,]/).map(s => s.trim()).filter(Boolean);

  // 场景/皮肤/画质描述全部为空时才弹窗提示
  const hasSceneCN = enrichCN.length > 0, hasSceneEN = enrichEN.length > 0;
  const hasSkinCN = skinCN.length > 0, hasSkinEN = skinEN.length > 0;
  const hasQualCN = qualityCN.length > 0, hasQualEN = qualityEN.length > 0;
  if (!hasSceneCN && !hasSkinCN && !hasQualCN) {
    showToast('⚠️ 所有中文描述模板都为空，请先在「管理类别与提示词」→ 润色模板中添加内容', 'error');
    return;
  }
  if (!hasSceneEN && !hasSkinEN && !hasQualEN) {
    showToast('⚠️ 所有英文描述模板都为空，请先在「管理类别与提示词」→ 润色模板中添加内容', 'error');
    return;
  }

  // Detect identity prefix: first 1~3 segments may be region, age, gender
  let identityEnd = 0;
  if (segments.length > 0 && identityRegions.includes(segments[0])) {
    identityEnd = 1;
    if (segments.length > 1 && segments[1].endsWith('岁')) identityEnd = 2;
    if (segments.length > 2 && identityGenders.includes(segments[2])) identityEnd = 3;
  }

  const bodySegments = segments.slice(identityEnd);
  const idEn = getIdentityEn();

  // 只从非空数组中随机取
  const base = hasSceneCN ? enrichCN[Math.floor(Math.random() * enrichCN.length)] : '';
  const skin = hasSkinCN ? skinCN[Math.floor(Math.random() * skinCN.length)] : '';
  const qual = hasQualCN ? qualityCN[Math.floor(Math.random() * qualityCN.length)] : '';
  const baseEn = hasSceneEN ? enrichEN[Math.floor(Math.random() * enrichEN.length)] : '';
  const skinEn = hasSkinEN ? skinEN[Math.floor(Math.random() * skinEN.length)] : '';
  const qualEn = hasQualEN ? qualityEN[Math.floor(Math.random() * qualityEN.length)] : '';

  // CN optimized
  const identityCn = segments.slice(0, identityEnd).join('，');
  const bodyCn = bodySegments.join('，');
  let optimizedCn = '';
  if (base) optimizedCn += base + ' ';
  if (identityCn) optimizedCn += identityCn + '，';
  optimizedCn += bodyCn;
  if (skin) optimizedCn += '。' + skin;
  if (qual) optimizedCn += ' ' + qual;

  // EN optimized - look up each body segment in CN_EN_MAP or search DATA items
  const enParts = bodySegments.map(s => {
    const e = CN_EN_MAP[s];
    if(e)return e.split('/')[0].trim();
    // Fallback: search DATA for the matching item
    if(DATA)for(const cat of DATA)for(const item of cat.items)if(item.cn===s)return item.en.split('/')[0].trim();
    return s;
  });
  let optimizedEn = '';
  if (baseEn) optimizedEn += baseEn + ' ';
  if (idEn) optimizedEn += idEn + ', ';
  optimizedEn += enParts.join(', ');
  if (skinEn) optimizedEn += '. ' + skinEn;
  if (qualEn) optimizedEn += ' ' + qualEn;

  document.getElementById('promptArea').value = optimizedCn;
  document.getElementById('promptEnArea').value = optimizedEn;
  resizePromptAreas();
  showToast('✨ 优化完成，已应用深度描述', 'success');
}

function copyPrompt(id) {

  navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制到剪贴板', 'success')).catch(() => { document.getElementById(id).select(); document.execCommand('copy'); showToast('✅ 已复制到剪贴板', 'success'); });
}

function addToPrompt(text) {
  const ta = document.getElementById('promptArea');
  const tea = document.getElementById('promptEnArea');
  const current = ta.value.trim();
  const enText = CN_EN_MAP[text] || text;
  const enFirst = enText.split('/')[0].trim();
  if (current) {
    ta.value = current + '，' + text;
    tea.value = (tea.value.trim() ? tea.value.trim() + ', ' : '') + enFirst;
  } else {
    ta.value = text;
    tea.value = enFirst;
  }
  resizePromptAreas();
  ta.focus();
}

// ===== Data persistence =====
function saveData() {
  const toSave = DATA.map(cat => ({
    name: cat.name,
    file: cat.file || '',
    items: cat.items,
    count: cat.items.length
  }));
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    localStorage.setItem(STORAGE_KEY + '_enabled', JSON.stringify(promptsEnabled));
  } catch(e) {
    showToast('⚠️ 存储空间不足，请清理部分数据', 'error');
  }
  syncAllToServer();
}

const SERVER_KEYS = {
  prompts: ['pg_prompts_data','pg_prompts_data_enabled','pg_identity_regions','pg_identity_genders','pg_identity_age','pg_identity_age_random','pg_identity_region_random','pg_identity_gender_random','pg_enrichCN','pg_enrichEN','pg_skinCN','pg_skinEN','pg_qualityCN','pg_qualityEN'],
  ai: ['pg_ai_settings','pg_ai_preset','pg_ai_history'],
  comfy: ['pg_comfy_settings','pg_comfy_workflows','pg_comfy_gallery']
};

async function syncAllToServer(){
  if(!window.location.origin||!window.location.origin.startsWith('http'))return;
  const results = await Promise.allSettled(['prompts','ai','comfy'].map(async cat=>{
    const data={};
    SERVER_KEYS[cat].forEach(k=>{
      try{const v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v);}catch(e){}
    });
    if(!Object.keys(data).length)return;
    const r=await fetch('/api/save-'+cat,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(!r.ok)throw new Error(`/server/save-${cat} 返回 ${r.status}`);
  }));
  const failed = results.filter(r=>r.status==='rejected');
  if(failed.length>0){
    console.error('❌ syncAllToServer 部分失败:', failed.map(r=>r.reason));
    showToast(`⚠️ 同步失败 ${failed.length}/${results.length} 个文件`, 'error');
  }
}

function saveEnrichData(){
  try{
    localStorage.setItem('pg_enrichCN',JSON.stringify(enrichCN));
    localStorage.setItem('pg_enrichEN',JSON.stringify(enrichEN));
    localStorage.setItem('pg_skinCN',JSON.stringify(skinCN));
    localStorage.setItem('pg_skinEN',JSON.stringify(skinEN));
    localStorage.setItem('pg_qualityCN',JSON.stringify(qualityCN));
    localStorage.setItem('pg_qualityEN',JSON.stringify(qualityEN));
  }catch(e){}
  // 异步同步到服务器（静默失败不影响本地数据）
  syncAllToServer();
}

async function loadDataConstants() {
  if(!window.location.origin||!window.location.origin.startsWith('http'))return;
  // Load CN_EN_MAP, IDENTITY_EN, and enrich_data from prompts.json response (merged by server)
  let loadedFromServer = false;
  try{
    const r=await fetch('/api/load-prompts',{signal:AbortSignal.timeout(3000)});
    if(r.ok){const d=await r.json();if(d&&typeof d==='object'){
      if(d.identity_en&&typeof d.identity_en==='object'){IDENTITY_EN=d.identity_en;console.log('✅ Loaded IDENTITY_EN from prompts ('+Object.keys(d.identity_en).length+' entries)');}
      if(d.cn_en_map&&typeof d.cn_en_map==='object'){CN_EN_MAP=d.cn_en_map;console.log('✅ Loaded CN_EN_MAP from prompts ('+Object.keys(d.cn_en_map).length+' entries)');}
      // Load enrich_data from prompts.json response (nested format)
      if(d.enrich_data&&typeof d.enrich_data==='object'){
        if(d.enrich_data.enrichCN)enrichCN=d.enrich_data.enrichCN;
        if(d.enrich_data.enrichEN)enrichEN=d.enrich_data.enrichEN;
        if(d.enrich_data.skinCN)skinCN=d.enrich_data.skinCN;
        if(d.enrich_data.skinEN)skinEN=d.enrich_data.skinEN;
        if(d.enrich_data.qualityCN)qualityCN=d.enrich_data.qualityCN;
        if(d.enrich_data.qualityEN)qualityEN=d.enrich_data.qualityEN;
        console.log('✅ Loaded enrich_data from prompts ('+Object.keys(d.enrich_data).length+' keys)');
      }
      // Load server direct keys (pg_enrichCN etc.) — authoritative source
      const enrichDirectMap = {
        'pg_enrichCN': 'enrichCN', 'pg_enrichEN': 'enrichEN',
        'pg_skinCN': 'skinCN', 'pg_skinEN': 'skinEN',
        'pg_qualityCN': 'qualityCN', 'pg_qualityEN': 'qualityEN'
      };
      for(const [serverKey, localKey] of Object.entries(enrichDirectMap)){
        if(d[serverKey]!==undefined){
          const arr = getEnrichArray(localKey);
          arr.length = 0;
          arr.push(...d[serverKey]);
        }
      }
      loadedFromServer = true;
      console.log('✅ Loaded enrich data from server (real-time)');
    }}
  }catch(e){}

  // 仅当服务器不可用时，从 localStorage 后备加载
  if(!loadedFromServer){
    try{
      const lsEnrich=localStorage.getItem('pg_enrichCN');if(lsEnrich)enrichCN=JSON.parse(lsEnrich);
      const lsEnrichEN=localStorage.getItem('pg_enrichEN');if(lsEnrichEN)enrichEN=JSON.parse(lsEnrichEN);
      const lsSkin=localStorage.getItem('pg_skinCN');if(lsSkin)skinCN=JSON.parse(lsSkin);
      const lsSkinEN=localStorage.getItem('pg_skinEN');if(lsSkinEN)skinEN=JSON.parse(lsSkinEN);
      const lsQual=localStorage.getItem('pg_qualityCN');if(lsQual)qualityCN=JSON.parse(lsQual);
      const lsQualEN=localStorage.getItem('pg_qualityEN');if(lsQualEN)qualityEN=JSON.parse(lsQualEN);
      console.log('ℹ️ Server unavailable, loaded enrich data from localStorage');
    }catch(e){}
  }

  // 将最终结果持久化到 localStorage（仅本地，不触发服务器同步）
  try{
    localStorage.setItem('pg_enrichCN',JSON.stringify(enrichCN));
    localStorage.setItem('pg_enrichEN',JSON.stringify(enrichEN));
    localStorage.setItem('pg_skinCN',JSON.stringify(skinCN));
    localStorage.setItem('pg_skinEN',JSON.stringify(skinEN));
    localStorage.setItem('pg_qualityCN',JSON.stringify(qualityCN));
    localStorage.setItem('pg_qualityEN',JSON.stringify(qualityEN));
  }catch(e){}
}

const ENRICH_KEYS = new Set(['pg_enrichCN','pg_enrichEN','pg_skinCN','pg_skinEN','pg_qualityCN','pg_qualityEN']);

async function loadAllFromServer(){
  if(!window.location.origin||!window.location.origin.startsWith('http'))return false;
  let total=0;
  for(const cat of['prompts','ai','comfy']){
    try{
      const r=await fetch('/api/load-'+cat,{signal:AbortSignal.timeout(2000)});
      if(!r.ok)continue;
      const data=await r.json();
      if(!data)continue;
      SERVER_KEYS[cat].forEach(k=>{
        // 跳过润色模板键——由 loadDataConstants 处理
        if(ENRICH_KEYS.has(k))return;
        if(data[k]!==undefined){localStorage.setItem(k,JSON.stringify(data[k]));total++;}
      });
    }catch(e){}
  }
  if(total>0){console.log('📂 Loaded',total,'items from server files');return true;}
  return false;
}

  if (DATA.some(c => c.name === name)) { showToast('⚠️ 类别已存在', 'error'); return; }
  DATA.push({ name, file: '', items: [], count: 0 });
  promptsEnabled[name] = true;
  input.value = '';
  saveData();
  renderCategories();
  showToast(`✅ 已添加类别「${name}」`, 'success');
}

function batchAddCategories() {
  const ta = document.getElementById('batchCatInput');
  const lines = ta.value.split('\n').map(s => s.trim()).filter(Boolean);
  if (lines.length === 0) { showToast('⚠️ 请输入类别名称，每行一个', 'error'); return; }
  let added = 0;
  lines.forEach(name => {
    if (!DATA.some(c => c.name === name)) {
      DATA.push({ name, file: '', items: [], count: 0 });
      promptsEnabled[name] = true;
      added++;
    }
  });
  ta.value = '';
  if (added === 0) { showToast('⚠️ 所有类别已存在', 'error'); return; }
  saveData();
  renderCategories();
  showToast(`✅ 已批量添加 ${added} 个类别`, 'success');
}

  DATA.splice(idx, 1);
  delete promptsEnabled[cat.name];

function renderPromptList(container, filter) {
  const cat = DATA[_pmCatIdx];
  if (!cat) return;
  container.innerHTML = '';
  const items = filter
    ? cat.items.filter(i => i.cn.toLowerCase().includes(filter) || (i.en && i.en.toLowerCase().includes(filter)))
    : cat.items;
  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'pm-empty';
    empty.textContent = filter ? '无匹配结果' : '暂无提示词，请在下方添加';
    container.appendChild(empty);
    return;
  }
  items.forEach((item, displayIdx) => {
    const realIdx = cat.items.indexOf(item);
    const row = document.createElement('div');
    row.className = 'pm-item';
    const textSpan = document.createElement('div');
    textSpan.style.cssText = 'display:flex;align-items:center;gap:6px;flex:1;min-width:0;';
    const cnSpan = document.createElement('span');
    cnSpan.className = 'pm-cn';
    cnSpan.textContent = item.cn;
    const enSpan = document.createElement('span');
    enSpan.className = 'pm-en';
    enSpan.textContent = item.en || '';
    textSpan.appendChild(cnSpan);
    textSpan.appendChild(enSpan);
    const delBtn = document.createElement('button');
    delBtn.className = 'btn-del';
    delBtn.textContent = '✕';
    delBtn.onclick = (e) => { e.stopPropagation(); deletePrompt(_pmCatIdx, realIdx); };
    delBtn.title = '删除此提示词';
    row.appendChild(textSpan);
    row.appendChild(delBtn);
    container.appendChild(row);
  });
  // Update badge count
  const badge = document.querySelector('#pmModal .mgmt-badge');
  if (badge) badge.textContent = cat.items.length + ' 条';
}

// ===== Prompt management actions =====
function addPrompt() {
  const cn = document.getElementById('pmNewCn').value.trim();
  const en = document.getElementById('pmNewEn').value.trim();
  if (!cn) { showToast('⚠️ 中文内容不能为空', 'error'); return; }
  DATA[_pmCatIdx].items.push({ cn, en });
  document.getElementById('pmNewCn').value = '';
  document.getElementById('pmNewEn').value = '';
  saveData();
  // Re-render prompt manager modal
  const body = document.getElementById('pmBody');
  if (body) renderPromptManager(body);
  // Also re-render category cards
  renderCategories();
  showToast(`✅ 已添加提示词「${cn}」`, 'success');
}

function batchAddPrompts() {
  const ta = document.getElementById('pmBatchTa');
  const lines = ta.value.split('\n').map(s => s.trim()).filter(Boolean);
  if (lines.length === 0) { showToast('⚠️ 请输入提示词，每行一条', 'error'); return; }
  let added = 0;
  lines.forEach(line => {
    // Split by Chinese comma or English comma
    const sep = line.includes('，') ? '，' : (line.includes(',') ? ',' : null);
    let cn, en = '';
    if (sep) {
      const parts = line.split(sep);
      cn = parts[0].trim();
      en = parts.slice(1).join(sep).trim();
    } else {
      cn = line.trim();
    }
    if (cn) {
      DATA[_pmCatIdx].items.push({ cn, en });
      added++;
    }
  });
  ta.value = '';
  saveData();
  const body = document.getElementById('pmBody');
  if (body) renderPromptManager(body);
  renderCategories();
  showToast(`✅ 已批量添加 ${added} 条提示词`, 'success');
}

function deletePrompt(catIdx, itemIdx) {
  const cat = DATA[catIdx];
  if (!cat || !cat.items[itemIdx]) return;
  const cn = cat.items[itemIdx].cn;
  cat.items.splice(itemIdx, 1);
  saveData();
  const body = document.getElementById('pmBody');
  if (body) renderPromptManager(body);
  renderCategories();
  showToast(`🗑️ 已删除「${cn}」`, 'success');
}

// ===== Fetch Models =====
async function fetchModels(baseUrl,apiKey,provider,modelInput) {
  const btn=document.getElementById('fetchModelsBtn'); if(!btn)return;
  btn.textContent='⏳ 获取中...'; btn.disabled=true;
  try {
    const url=baseUrl.replace(/\/+$/,'')+'/models';
    const h={'Content-Type':'application/json'};
    const p=AI_PROVIDERS[provider];
    if(p&&p.online&&apiKey)h['Authorization']='Bearer '+apiKey;
    const r=await fetch(url,{headers:h});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json(); const models=d.data||[];
    if(!models.length){showToast('⚠️ 未获取到模型列表','error');return;}
    const cur=modelInput.value;
    const ms=document.createElement('select');ms.className='ai-model-select';
    const ph=document.createElement('option');ph.value='';ph.textContent='-- 选择模型 --';ms.appendChild(ph);
    models.forEach(m=>{const o=document.createElement('option');o.value=m.id||m.name;o.textContent=m.id||m.name;if(o.value===cur)o.selected=true;ms.appendChild(o);});
    ms.onchange=()=>{modelInput.value=ms.value;ms.remove();};
    modelInput.parentNode.insertBefore(ms,modelInput.nextSibling);
    showToast('✅ 获取到 '+models.length+' 个模型，请选择','success');
  } catch(e){showToast('⚠️ 获取模型失败: '+e.message,'error');}
  finally{btn.textContent='📡 获取模型';btn.disabled=false;}
}

// ===== Test Connection =====
async function testConnection(baseUrl,apiKey,provider,model) {
  const btn=document.getElementById('aiTestBtn'); if(!btn)return;
  if(!baseUrl){showToast('⚠️ 请输入 API 地址','error');return;}
  if(!model){showToast('⚠️ 请输入模型名称','error');return;}
  btn.textContent='⏳ 测试中...'; btn.disabled=true;
  try {
    const url=baseUrl.replace(/\/+$/,'')+'/chat/completions';
    const h={'Content-Type':'application/json'};
    const p=AI_PROVIDERS[provider];
    if(apiKey)h['Authorization']='Bearer '+apiKey;
    const r=await fetch(url,{method:'POST',headers:h,body:JSON.stringify({model,messages:[{role:'user',content:'Reply with "OK" only.'}],max_tokens:10})});
    if(!r.ok){const t=await r.text().catch(()=>'');throw new Error('HTTP '+r.status+(t?': '+t.slice(0,200):''));}
    const d=await r.json();
    if(d.error)throw new Error('API 返回错误: '+JSON.stringify(d.error).slice(0,200));
    let testReply='';
    if(d.choices&&d.choices[0]&&d.choices[0].message)testReply=d.choices[0].message.content;
    if(!testReply&&d.response)testReply=d.response;
    if(!testReply)throw new Error('API 响应格式异常: '+JSON.stringify(d).slice(0,200));
    showToast('✅ 连接成功！模型响应: '+testReply.slice(0,60),'success');
  } catch(e){showToast('❌ 连接失败: '+e.message,'error');}
  finally{btn.textContent='🔌 测试连接';btn.disabled=false;}
}

    let userContent='请优化以下提示词，保留中英文对照：\n\n中文：'+cn;
    if(en) userContent+='\n\nEnglish: '+en;
    msgs.push({role:'user',content:userContent});

    const url=aiSettings.baseUrl.replace(/\/+$/,'')+'/chat/completions';
    const h={'Content-Type':'application/json'};
    if(aiSettings.apiKey)h['Authorization']='Bearer '+aiSettings.apiKey;

    const r=await fetch(url,{method:'POST',headers:h,body:JSON.stringify({model:aiSettings.model,messages:msgs,max_tokens:2048,temperature:0.7})});
    if(!r.ok){const t=await r.text().catch(()=>'');throw new Error('HTTP '+r.status+(t?': '+t.slice(0,200):''));}
    const d=await r.json();
    // Check API error field (some providers return 200 with error)
    if(d.error){const e=typeof d.error==='string'?d.error:JSON.stringify(d.error).slice(0,300);throw new Error('API 错误: '+e);}
    // Robust response parsing
    let reply='';
    if(d.choices&&d.choices.length>0){
      const c=d.choices[0];

      else if(c.message&&c.message.refusal)reply='[AI 拒绝回答] '+c.message.refusal;
      else if(c.text!=null)reply=c.text;
    }
    if(!reply&&d.response)reply=d.response;

    // Parse structured response
    const cnM=reply.match(/## 中文翻译\n*([\s\S]*?)(?:\n##|$)/);
    const enM=reply.match(/## 优化后英文提示词\n*([\s\S]*?)(?:\n##|$)/);
    let polCn=cnM?cnM[1].trim():'', polEn=enM?enM[1].trim():'';

    if(polCn)document.getElementById('promptArea').value=polCn;
    if(polEn)document.getElementById('promptEnArea').value=polEn;
    if(!polCn&&!polEn)document.getElementById('promptArea').value=reply;

    // Save to history
    aiHistory.unshift({timestamp:Date.now(),original:cn,polished:polCn||reply,originalEn:en,polishedEn:polEn});
    if(aiHistory.length>20)aiHistory=aiHistory.slice(0,20);
    saveAiHistory();
    resizePromptAreas();
    showToast('🤖 AI 润色完成','success');
  } catch(e){showToast('❌ AI 润色失败: '+e.message,'error');}
  finally{btn.textContent=orig||'🤖 AI';btn.disabled=false;}
}

async function checkComfyConnection(){
  try{
    const url=getComfyBaseUrl()+'/system_stats';
    const r=await fetch(url,{method:'GET',signal:AbortSignal.timeout(3000)});
    comfyConnected=r.ok;
    if(!comfyConnected)showToast('⚠️ ComfyUI 响应异常（状态码:'+r.status+'）','error');
    updateComfyStatus();
    return comfyConnected;
  }catch(e){
    // If proxy was enabled but failed, try direct
    if(comfySettings.useProxy){
      comfySettings.useProxy=false;saveComfySettings();
      try{
        const url=comfySettings.url.replace(/\/+$/,'')+'/system_stats';
        const r=await fetch(url,{method:'GET',signal:AbortSignal.timeout(3000)});
        comfyConnected=r.ok;updateComfyStatus();
        if(comfyConnected)showToast('⚠️ 代理不可用，已切换到直连','error');
        return comfyConnected;
      }catch(e2){}
    }
    // Auto-enable proxy if page is served via HTTP
    const origin=window.location.origin;
    if(origin&&origin.startsWith('http')&&!comfySettings.useProxy){
      comfySettings.useProxy=true;saveComfySettings();
      return await checkComfyConnection();
    }
    comfyConnected=false;updateComfyStatus();
    const msg=e.message||'';
    if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('net::ERR'))
      showToast('⚠️ 浏览器跨域限制: 请关闭后通过 start_server.bat 启动服务来打开页面','error');
    else if(msg)
      showToast('⚠️ 连接失败: '+msg.slice(0,100),'error');
    return false;
  }
}

// Workflow conversion
const WIDGET_MAP={'CLIPTextEncode':['text'],'EmptyLatentImage':['width','height','batch_size'],'KSampler':['seed','steps','cfg','sampler_name','scheduler','denoise'],'KSamplerAdvanced':['seed','steps','cfg','sampler_name','scheduler','denoise'],'CheckpointLoaderSimple':['ckpt_name'],'VAEDecode':[],'VAELoader':['vae_name'],'CLIPSetLastLayer':['stop_at_clip_layer'],'LoraLoader':['lora_name','strength_model','strength_clip'],'ControlNetLoader':['control_net_name']};

function findPromptNodes(wf){
  if(!wf||typeof wf!=='object')return[];
  // Format 1: saved workflow {nodes:[...], links:[...]}
  if(Array.isArray(wf.nodes))return wf.nodes.filter(n=>n&&(n.type==='CLIPTextEncode'||n.class_type==='CLIPTextEncode'));
  // Format 2: wrapped {prompt:{...}}
  const data=wf.prompt||wf;
  // Format 3: direct API format {node_id:{class_type:'CLIPTextEncode',...}}
  if(typeof data==='object'&&!Array.isArray(data))
    return Object.values(data).filter(n=>n&&typeof n==='object'&&n.class_type==='CLIPTextEncode');
  return[];
}

function workflowToPrompt(wf,text,width,height,seed){
  // Detect format: saved workflow has nodes array, API format has keys with class_type
  if(Array.isArray(wf.nodes))return _convertNodesFormat(wf,text,width,height,seed);
  const data=wf.prompt||wf;
  if(typeof data==='object'&&!Array.isArray(data))return _convertApiFormat(data,text,width,height,seed);
  return {};
}

function _convertNodesFormat(wf,text,width,height,seed){
  const prompt={},linkMap={};
  (wf.links||[]).forEach(l=>{linkMap[l[0]]={from:l[1],fromSlot:l[2],to:l[3],toSlot:l[4]};});
  (wf.nodes||[]).forEach(n=>{
    if(!n){return;}
    const inputs={}, inputList=n.inputs||[], widgets=n.widgets_values||[];
    let wi=0;
    // Iterate through each input descriptor (like super-grimoire does)
    inputList.forEach(inp=>{
      if(!inp)return;
      // ComfyUI saved format: {"name":"seed","type":"INT","link":5} or {"name":"steps","widget":{"name":"steps"},"link":null}
      const inName=inp.name||inp[0]||'';
      if(!inName)return;
      if(inp.link!=null){
        // Input is linked from another node
        if(typeof inp.link==='number'&&linkMap[inp.link]){
          inputs[inName]=[linkMap[inp.link].from,linkMap[inp.link].fromSlot];
        }else if(Array.isArray(inp.link)&&inp.link.length>=2){
          inputs[inName]=[inp.link[0],inp.link[1]];
        }
        // Skip widget value index for linked inputs
        if(inp.widget)wi++;
      }else if(inp.widget||inp.name){
        // Input is a widget (not linked)
        if(wi<widgets.length){
          inputs[inName]=widgets[wi];wi++;
        }
      }else if(Array.isArray(inp)&&inp.length>=2){
        // Legacy array format: ["steps",20]
        const n2=inp[0],v2=inp[1];
        if(typeof v2==='number'||typeof v2==='string'){
          inputs[n2]=v2;
        }
      }
    });
    // Override prompt text for CLIPTextEncode
    if(n.type==='CLIPTextEncode'&&widgets.length>0&&!inputs.text)inputs.text=text;
    // Override dimensions for EmptyLatentImage
    if(n.type==='EmptyLatentImage'){if(width)inputs.width=width;if(height)inputs.height=height;}
    // Randomize seed for ANY node that has a seed/noise_seed input
    if('seed'in inputs)inputs.seed=seed!==undefined?seed:Math.floor(Math.random()*2147483647);
    if('noise_seed'in inputs)inputs.noise_seed=seed!==undefined?seed:Math.floor(Math.random()*2147483647);
    prompt[n.id]={class_type:n.type,inputs};
  });
  return prompt;
}

function _convertApiFormat(data,text,width,height,seed){
  const prompt={};
  Object.entries(data||{}).forEach(([nid,n])=>{
    if(!n||typeof n!=='object')return;
    const inputs=JSON.parse(JSON.stringify(n.inputs||{}));
    if(n.class_type==='CLIPTextEncode'&&'text'in inputs)inputs.text=text;
    if(n.class_type==='EmptyLatentImage'){if(width)inputs.width=width;if(height)inputs.height=height;}
    // Randomize seed for ANY node that has a seed/noise_seed input
    if('seed'in inputs)inputs.seed=seed!==undefined?seed:Math.floor(Math.random()*2147483647);
    if('noise_seed'in inputs)inputs.noise_seed=seed!==undefined?seed:Math.floor(Math.random()*2147483647);
    prompt[nid]={class_type:n.class_type,inputs};
  });
  return prompt;
}

// ===== ComfyUI Queue & Progress =====

function _updateProgress(status, current, total, elapsed) {
  const wrap = document.getElementById('comfyProgressWrap');
  if (!wrap) return;
  const fill = document.getElementById('comfyProgressFill');
  const info = document.getElementById('comfyProgressInfo');
  if (!total || total <= 0) {
    if (fill) fill.style.width = '0%';
  } else {
    if (fill) fill.style.width = Math.min(100, Math.round((current / total) * 100)) + '%';
  }
  if (info) {
    const es = elapsed > 0 ? _fmtTime(elapsed) : '--:--';
    info.innerHTML = `<span>${current}/${total}</span><span>⏱ ${es}</span><span class="pp-status">${status}</span>`;
  }
  wrap.style.display = 'block';
}

function _hideProgress() {
  const wrap = document.getElementById('comfyProgressWrap');
  if (wrap) wrap.style.display = 'none';
}

function _fmtTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function _getWorkflowSteps(wf) {
  if (Array.isArray(wf.nodes)) {
    for (const n of wf.nodes) {
      if ((n.type === 'KSampler' || n.type === 'KSamplerAdvanced') && n.widgets_values) {
        const si = n.widgets_values.length >= 2 ? 1 : 0;
        return parseInt(n.widgets_values[si]) || 20;
      }
    }
  }
  const data = wf.prompt || wf;
  if (typeof data === 'object' && !Array.isArray(data)) {
    for (const n of Object.values(data)) {
      if (n && n.class_type && (n.class_type === 'KSampler' || n.class_type === 'KSamplerAdvanced') && n.inputs) {
        return parseInt(n.inputs.steps) || 20;
      }
    }
  }
  return 20;
}

async function _pollComfyUI(pid, steps) {
  const url = getComfyBaseUrl() + '/api/history/' + pid;
  const startTime = Date.now();
  for (let i = 1; i <= 300; i++) {
    await new Promise(r => setTimeout(r, 1000));
    const elapsed = (Date.now() - startTime) / 1000;
    try {
      const r = await fetch(url);
      if (r.ok) {
        const d = await r.json();
        if (d[pid]) {
          const s = d[pid].status;
          if (s && s.completed) return d[pid];
          if (s && s.error) throw new Error(s.error_message || 'ComfyUI 生图失败');
          // Show progress: estimate steps from elapsed time
          const estSteps = Math.min(steps, Math.max(1, Math.floor(elapsed / 0.8)));
          _updateProgress(`🎨 生成中... ${estSteps}/${steps}步`, i, Math.max(steps * 2, 20), elapsed);
        }
      }
    } catch(e) {
      if (i < 5) continue;
      throw e;
    }
  }
  throw new Error('ComfyUI 生图超时');
}

function _extractImages(historyData) {
  const images = [];
  const outputs = historyData.outputs;
  if (!outputs) return images;
  const baseUrl = getComfyBaseUrl();
  for (const nodeId of Object.keys(outputs)) {
    const node = outputs[nodeId];
    if (node.images && Array.isArray(node.images)) {
      for (const img of node.images) {
        if (img.filename) {
          images.push(baseUrl + '/api/view?filename=' + encodeURIComponent(img.filename) +
            '&subfolder=' + encodeURIComponent(img.subfolder || '') +
            '&type=' + encodeURIComponent(img.type || 'output'));
        }
      }
    }
  }
  return images;
}

async function startComfyGeneration() {
  if (comfyQueueRunning) {
    showToast('⚠️ 生成中，请等待当前队列完成', 'error');
    return;
  }
  // Connection check
  if (!comfyConnected) {
    const ok = await checkComfyConnection();
    if (!ok) { showToast('⚠️ ComfyUI 未连接', 'error'); return; }
  }
  // Workflow check
  if (comfySettings.selectedWorkflow < 0 || comfySettings.selectedWorkflow >= comfyWorkflows.length) {
    showToast('⚠️ 请先上传并选择工作流（⚙️ 设置）', 'error');
    return;
  }
  const wf = comfyWorkflows[comfySettings.selectedWorkflow].data;
  if (findPromptNodes(wf).length === 0) {
    showToast('⚠️ 工作流中未找到 CLIPTextEncode 节点', 'error');
    return;
  }
  const btn = document.getElementById('comfyStartBtn');
  const stopBtn = document.getElementById('comfyStopBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  stopBtn.style.display = 'inline';
  comfyStopped = false;
  comfyQueueRunning = true;
  const total = comfySettings.randomCount * comfySettings.batchCount;
  let completed = 0;
  const startTime = Date.now();
  const useAi = document.getElementById('aiToggle') && document.getElementById('aiToggle').checked;
  const cnArea = document.getElementById('promptArea');
  const enArea = document.getElementById('promptEnArea');
  try {
    for (let p = 0; p < comfySettings.randomCount; p++) {
      if(comfyStopped)break;
      // 1. Generate random prompt from enabled categories
      let promptText = '';
      const ec = DATA.filter(c => promptsEnabled[c.name]);
      if (ec.length > 0) {
        if (comfySettings.language === 'en') {
          promptText = ec.map(c => {
            const item = c.items[Math.floor(Math.random() * c.items.length)];
            return item ? item.en.split('/')[0].trim() : '';
          }).filter(Boolean).join(', ');
        } else {
          const picks = [];
          ec.forEach(c => { if (c.items.length) picks.push(c.items[Math.floor(Math.random() * c.items.length)]); });
          promptText = getIdentityPrefix() + '，' + picks.map(p => p.cn).join('，');
        }
      }
      if (!promptText) {
        promptText = comfySettings.language === 'en'
          ? (enArea.value.trim() || cnArea.value.trim())
          : cnArea.value.trim();
        if (!promptText) { showToast('⚠️ 提示词为空', 'error'); break; }
      }
      // 2. Set prompt into textareas for optimize/AI polish
      if (comfySettings.language === 'en') {
        enArea.value = promptText;
        cnArea.value = promptText;
      } else {
        cnArea.value = promptText;
        const enParts = ec.map(c => {
          const item = c.items[Math.floor(Math.random() * c.items.length)];
          return item ? item.en.split('/')[0].trim() : '';
        }).filter(Boolean);
        enArea.value = getIdentityEn() + ', ' + enParts.join(', ');
      }
      resizePromptAreas();
      // 3. Apply template optimize
      _updateProgress(`✨ 优化中... (${p+1}/${comfySettings.randomCount}组)`, completed, total, (Date.now() - startTime) / 1000);
      optimizePrompt();
      await new Promise(r => setTimeout(r, 50));
      // 4. AI polish if toggle ON
      if (useAi && aiSettings && aiSettings.baseUrl) {
        _updateProgress(`🤖 AI 润色中... (${p+1}/${comfySettings.randomCount}组)`, completed, total, (Date.now() - startTime) / 1000);
        await aiPolish();
        await new Promise(r => setTimeout(r, 100));
      }
      // 5. Read final prompt
      const finalPrompt = comfySettings.language === 'en'
        ? enArea.value.trim() || cnArea.value.trim()
        : cnArea.value.trim();
      if (!finalPrompt) { showToast('⚠️ 优化后提示词为空，跳过', 'error'); continue; }
      // 6. Send batches to ComfyUI
      const steps = _getWorkflowSteps(wf);
      for (let b = 0; b < comfySettings.batchCount; b++) {
        if(comfyStopped){completed+=comfySettings.batchCount-b;break;}
        completed++;
        const elapsed = (Date.now() - startTime) / 1000;
        _updateProgress(`🚀 第 ${completed}/${total}`, completed, total, elapsed);
        const seed = Math.floor(Math.random() * 2147483647) + 1;
        _updateProgress(`🎲 种子 ${seed} (${completed}/${total})`, completed, total, elapsed);
        const pd = workflowToPrompt(wf, finalPrompt, comfySettings.width, comfySettings.height, seed);
        // Second pass: ensure ALL seed inputs are set
        let seedCount=0;
        Object.keys(pd).forEach(nid=>{
          const ni=pd[nid]&&pd[nid].inputs;
          if(!ni)return;
          if('seed'in ni){ni.seed=seed;seedCount++;}
          if('noise_seed'in ni){ni.noise_seed=seed;seedCount++;}
        });
        // If no seed nodes found, print debug
        if(!seedCount)_updateProgress(`⚠️ 未找到seed节点 (${completed}/${total})`, completed, total, elapsed);
        // Send
        _updateProgress(`📤 发送中... (${completed}/${total})`, completed, total, elapsed);
        const result = await sendToComfy(pd, wf);
        // Poll with progress
        _updateProgress(`🎨 生成中... 0/${steps}步`, completed, total, elapsed);
        const historyData = await _pollComfyUI(result.prompt_id, steps);
        // Extract and display images
        const imgs = _extractImages(historyData);
        for (const imgUrl of imgs) {
          addToComfyGallery(imgUrl, completed, finalPrompt, seed);
        }
        _updateProgress(`✅ 已完成 ${completed}/${total}`, completed, total, (Date.now() - startTime) / 1000);
        await new Promise(r => setTimeout(r, 200));
      }
    }
    const finalElapsed = (Date.now() - startTime) / 1000;
    _updateProgress(`✅ 全部完成! ${completed}/${total}`, completed, total, finalElapsed);
    showToast(`🎉 生图完成！共 ${completed} 张`, 'success');
  } catch(e) {
    showToast('❌ 生图失败: ' + e.message.slice(0, 150), 'error');
    _updateProgress(`❌ ${e.message.slice(0, 50)}`, completed, total, (Date.now() - startTime) / 1000);
  } finally {
    btn.disabled = false;
    btn.textContent = comfyStopped ? '🔄 重新开始' : '🚀 开始生图';
    stopBtn.style.display = 'none';
    comfyQueueRunning = false;
    if(comfyStopped)_updateProgress('⏹ 已中止',0,0,0);
    else setTimeout(_hideProgress, 6000);
  }
}

function stopComfyGeneration(){
  comfyStopped=true;
  showToast('⏹ 正在中止生图...','success');
}

// ComfyUI Settings Modal

  const cBtn=document.createElement('button');cBtn.textContent='🔌 检测';cBtn.style.cssText='flex-shrink:0;padding:7px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;';

  const cStat=document.createElement('div');cStat.style.cssText='font-size:11px;color:var(--text2);margin-bottom:12px;';
  cStat.innerHTML='状态: '+(comfyConnected?'🟢 已连接':'🔴 未连接');bd.appendChild(cStat);

  const proxyRow=document.createElement('div');proxyRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:12px;';
  const proxyToggle=document.createElement('label');proxyToggle.className='toggle';
  const proxyCb=document.createElement('input');proxyCb.type='checkbox';proxyCb.id='comfyUseProxy';
  if(comfySettings.useProxy)proxyCb.checked=true;

  proxyToggle.appendChild(proxyCb);proxyToggle.appendChild(proxySlider);

  proxyLabel.textContent='使用代理（同源转发，解决跨域）';
  const proxyHint=document.createElement('span');proxyHint.style.cssText='font-size:10px;color:var(--text2);';
  if(window.location.origin&&window.location.origin.startsWith('http'))proxyHint.textContent='代理地址: '+window.location.origin+'/comfy-proxy';
  else proxyHint.textContent='需通过 HTTP 服务打开页面才可使用代理';
  proxyRow.appendChild(proxyToggle);proxyRow.appendChild(proxyLabel);
  bd.appendChild(proxyRow);bd.appendChild(proxyHint);

  // Workflow
  const sep=document.createElement('div');sep.style.cssText='border-top:1px solid var(--border);margin:10px 0;';bd.appendChild(sep);
  const wfLabel=document.createElement('div');wfLabel.className='ai-label';wfLabel.textContent='📂 工作流管理';bd.appendChild(wfLabel);
  const wfList=document.createElement('div');wfList.id='comfyWfList';bd.appendChild(wfList);
  function renderWfList(){
    wfList.innerHTML='';

      const row=document.createElement('div');row.className='comfy-wf-item';

  const sep2=document.createElement('div');sep2.style.cssText='border-top:1px solid var(--border);margin:10px 0;';bd.appendChild(sep2);

  const nodeInfo=document.createElement('div');nodeInfo.id='comfyNodeInfo';nodeInfo.className='comfy-node-info';

    if(comfySettings.selectedWorkflow>=0&&comfySettings.selectedWorkflow<comfyWorkflows.length){
      const pn=findPromptNodes(comfyWorkflows[comfySettings.selectedWorkflow].data);
      nodeInfo.textContent='🔍 已检测 '+pn.length+' 个 CLIPTextEncode 节点，将替换第 1 个的提示词';

  }
  updateNodeInfo();bd.appendChild(nodeInfo);

  // Language, random count, batch count
  const sep3=document.createElement('div');sep3.style.cssText='border-top:1px solid var(--border);margin:10px 0;';bd.appendChild(sep3);

  const langRow=document.createElement('div');langRow.style.cssText='display:flex;gap:8px;margin-bottom:10px;';
  ['en','cn'].forEach(v=>{
    const lbl=document.createElement('label');lbl.style.cssText='display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;';

    lbl.appendChild(inp);lbl.appendChild(document.createTextNode(v==='en'?'English 英文':'中文 Chinese'));langRow.appendChild(lbl);

  const rbRow=document.createElement('div');rbRow.style.cssText='display:flex;gap:16px;margin-bottom:10px;';

    const inp=document.createElement('input');inp.id=id;inp.type='number';inp.min=min;inp.max=max;inp.value=val;
    inp.style.cssText='width:80px;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;text-align:center;outline:none;font-family:inherit;';

    wrap.appendChild(inp);return wrap;
  }
  rbRow.appendChild(makeNumberInput('comfyRandCnt','随机提示词数量',comfySettings.randomCount,1,50));
  rbRow.appendChild(makeNumberInput('comfyBatchCnt','生图批次',comfySettings.batchCount,1,20));
  bd.appendChild(rbRow);

  // Save
  const sb=document.createElement('button');sb.className='ai-btn-full';sb.style.background='var(--accent)';sb.style.color='#fff';
  sb.textContent='💾 保存设置';
  sb.onclick=()=>{
    comfySettings.url=cUrl.value.replace(/\/+$/,'');
    comfySettings.width=parseInt(document.getElementById('comfyWidth').value)||512;
    comfySettings.height=parseInt(document.getElementById('comfyHeight').value)||512;
    comfySettings.randomCount=parseInt(document.getElementById('comfyRandCnt').value)||1;
    comfySettings.batchCount=parseInt(document.getElementById('comfyBatchCnt').value)||1;
    comfySettings.useProxy=document.getElementById('comfyUseProxy').checked;

  };
  bd.appendChild(sb);
  pn.appendChild(bd);ov.appendChild(pn);document.body.appendChild(ov);

  function autoDetectSizeInModal(){
    autoDetectSize();
